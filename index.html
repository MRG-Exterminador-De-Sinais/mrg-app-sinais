<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MRG Sinais Alto Padrão</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#060606;
    color:white;
    font-family:Arial, sans-serif;
}
.container{
    max-width:760px;
    margin:auto;
    padding:14px;
}
.header{
    text-align:center;
    margin-bottom:14px;
}
.header h1{
    margin:0;
    font-size:25px;
    color:#00ff88;
}
.header .linha{
    margin-top:5px;
    color:#ddd;
    font-size:15px;
}
.header .sub{
    margin-top:5px;
    color:#ffaa00;
    font-weight:bold;
    font-size:14px;
}
.card{
    background:#171717;
    border:1px solid #333;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
}
.titulo{
    color:#aaa;
    font-size:13px;
    margin-bottom:8px;
    letter-spacing:1px;
}
.leitura{
    border:1px solid #555;
    text-align:center;
}
.ativos-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}
.ativos-grid.dois{
    grid-template-columns:1fr 1fr;
}
.ativos-grid.tres{
    grid-template-columns:1fr 1fr;
}
.ativos-grid.tres .sinal-card:nth-child(3){
    grid-column:1 / 3;
}
.sinal-card{
    background:#202020;
    border:2px solid #00ff88;
    border-radius:16px;
    padding:14px;
    text-align:center;
}
.cat{
    color:#80c7ff;
    font-weight:bold;
    font-size:16px;
}
.alvo{
    font-size:42px;
    color:#00ff88;
    font-weight:bold;
    margin:6px 0;
}
.status{
    font-size:18px;
    color:#ffaa00;
    font-weight:bold;
}
.info{
    font-size:14px;
    color:#ddd;
    margin-top:4px;
}
.historico-item{
    border-bottom:1px solid #333;
    padding:9px 0;
    text-align:left;
}
.historico-item:last-child{
    border-bottom:none;
}
.badge{
    color:#00ff88;
    font-weight:bold;
}
.vazio{
    color:#aaa;
    text-align:center;
    padding:10px;
}
@media(max-width:600px){
    .ativos-grid.dois,
    .ativos-grid.tres{
        grid-template-columns:1fr;
    }
    .ativos-grid.tres .sinal-card:nth-child(3){
        grid-column:auto;
    }
    .alvo{
        font-size:38px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>MRG SINAIS ALTO PADRÃO</h1>
        <div class="linha">G1 SORTE NA BET | G2 BETOU</div>
        <div class="sub">MRG EXTERMINADOR DE SINAIS</div>
    </div>

    <div class="card leitura">
        <div class="titulo">LEITURA AO VIVO</div>
        <div id="leitura">Aguardando leitura do Exterminador de Sinais...</div>
    </div>

    <div class="card">
        <div class="titulo">SINAIS ATIVOS</div>
        <div id="ativos">Carregando sinais...</div>
    </div>

    <div class="card">
        <div class="titulo">HISTÓRICO RECENTE</div>
        <div id="historico">Carregando histórico...</div>
    </div>

</div>

<script>
const SUPABASE_URL = "https://bflptqejltvwfjhixwpj.supabase.co";
const SUPABASE_KEY = "sb_publishable_b2JbHd6f4drsWQIFgKEyRQ_QEDi4ODO";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function alvoNumero(alvo){
    if(!alvo) return 0;
    return Number(String(alvo).replace("x","").replace("X","").trim()) || 0;
}

function horarioValor(h){
    if(!h) return 999999;
    const partes = String(h).split(":").map(Number);
    if(partes.length < 2) return 999999;
    const hh = partes[0] || 0;
    const mm = partes[1] || 0;
    const ss = partes[2] || 0;
    return hh * 3600 + mm * 60 + ss;
}

function ehAtivo(item){
    if(item.ativo === true) return true;
    if(item.ativo === false) return false;

    const status = item.status || "";
    const s = status.toUpperCase();

    return (
        s === "ATIVO" ||
        s === "AGUARDANDO" ||
        s === "EM JANELA" ||
        s === "ATINGIDO ANTECIPADAMENTE" ||
        s === "TESTE" ||
        s === "PENDENTE"
    );
}

function nomeCategoria(item){
    return item.categoria || item.origem || item.tipo || "MRG";
}

function cardAtivo(item){
    return `
        <div class="sinal-card">
            <div class="cat">${nomeCategoria(item)}</div>
            <div class="alvo">${item.alvo || "-"}</div>
            <div class="status">${item.status || "-"}</div>
            <div class="info">Horário: ${item.horario || "não informado"}</div>
            <div class="info">VAR: ${item.variacao || "não informado"}</div>
            <div class="info">Janela: ${item.janela || "não informada"}</div>
            <div class="info">Score: ${item.score || "-"}</div>
        </div>
    `;
}

async function carregar() {
    const { data, error } = await db
        .from("sinais")
        .select("*")
        .order("id", { ascending: false })
        .limit(40);

    if (error) {
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Erro ao carregar sinais</div>";
        document.getElementById("historico").innerHTML = "<div class='vazio'>Verificar Supabase</div>";
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Nenhum sinal ativo</div>";
        document.getElementById("historico").innerHTML = "<div class='vazio'>Nenhum histórico</div>";
        return;
    }

    let ativos = data.filter(item => ehAtivo(item));
    let historico = data.filter(item => !ehAtivo(item));

    ativos.sort((a,b) => {
        const h = horarioValor(a.horario) - horarioValor(b.horario);
        if(h !== 0) return h;
        return alvoNumero(a.alvo) - alvoNumero(b.alvo);
    });

    ativos = ativos.slice(0,3);

    let classeGrid = "ativos-grid";
    if(ativos.length === 2) classeGrid += " dois";
    if(ativos.length === 3) classeGrid += " tres";

    if(ativos.length === 0){
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Nenhum sinal ativo no momento</div>";
    } else {
        let htmlAtivos = `<div class="${classeGrid}">`;
        ativos.forEach(item => {
            htmlAtivos += cardAtivo(item);
        });
        htmlAtivos += "</div>";
        document.getElementById("ativos").innerHTML = htmlAtivos;
    }

    if(historico.length === 0){
        document.getElementById("historico").innerHTML = "<div class='vazio'>Nenhum sinal encerrado ainda</div>";
    } else {
        let htmlHistorico = "";
        historico.forEach(item => {
            htmlHistorico += `
                <div class="historico-item">
                    <div><span class="badge">${item.alvo || "-"}</span> | ${item.status || "-"}</div>
                    <div>Origem: ${nomeCategoria(item)}</div>
                    <div>Horário: ${item.horario || "não informado"}</div>
                    <div>Janela: ${item.janela || "não informada"}</div>
                    <div>Resultado: ${item.resultado || "pendente"}</div>
                    <div>Multiplicador: ${item.multiplicador_real || "-"}</div>
                </div>
            `;
        });
        document.getElementById("historico").innerHTML = htmlHistorico;
    }
}

carregar();
setInterval(carregar, 5000);
</script>

</body>
</html>
