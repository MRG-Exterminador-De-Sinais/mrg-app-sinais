<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MRG Sinais Alto Padrão</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#060606;
    color:white;
    font-family:Arial, sans-serif;
}
.container{
    max-width:720px;
    margin:auto;
    padding:18px;
}
.header{
    text-align:center;
    margin-bottom:18px;
}
.header h1{
    margin:0;
    font-size:26px;
    color:#00ff88;
}
.header .linha{
    margin-top:6px;
    color:#ddd;
    font-size:15px;
}
.header .sub{
    margin-top:6px;
    color:#ffaa00;
    font-weight:bold;
    font-size:14px;
}
.card{
    background:#171717;
    border:1px solid #333;
    border-radius:18px;
    padding:18px;
    margin-bottom:16px;
}
.titulo{
    color:#aaa;
    font-size:14px;
    margin-bottom:10px;
    letter-spacing:1px;
}
.principal{
    text-align:center;
    border:2px solid #00ff88;
}
.origem{
    color:#80c7ff;
    font-weight:bold;
    font-size:18px;
}
.alvo{
    font-size:64px;
    color:#00ff88;
    font-weight:bold;
    margin:8px 0;
}
.status{
    font-size:22px;
    color:#ffaa00;
    font-weight:bold;
}
.info{
    font-size:15px;
    color:#ddd;
    margin-top:6px;
}
.historico-item{
    border-bottom:1px solid #333;
    padding:10px 0;
    text-align:left;
}
.historico-item:last-child{
    border-bottom:none;
}
.badge{
    color:#00ff88;
    font-weight:bold;
}
.vazio{
    color:#aaa;
    text-align:center;
    padding:12px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>MRG SINAIS ALTO PADRÃO</h1>
        <div class="linha">G1 SORTE NA BET | G2 BETOU</div>
        <div class="sub">MRG EXTERMINADOR DE SINAIS</div>
    </div>

    <div class="card principal">
        <div class="titulo">SINAL PRINCIPAL</div>
        <div id="principal">Carregando sinal...</div>
    </div>

    <div class="card">
        <div class="titulo">LEITURA AO VIVO</div>
        <div class="vazio">Aguardando leitura do robô...</div>
    </div>

    <div class="card">
        <div class="titulo">OUTROS SINAIS ATIVOS</div>
        <div id="ativos">Carregando...</div>
    </div>

    <div class="card">
        <div class="titulo">HISTÓRICO RECENTE</div>
        <div id="historico">Carregando histórico...</div>
    </div>

</div>

<script>
const SUPABASE_URL = "https://bflptqejltvwfjhixwpj.supabase.co";
const SUPABASE_KEY = "sb_publishable_b2JbHd6f4drsWQIFgKEyRQ_QEDi4ODO";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function ehAtivo(status){
    if(!status) return false;
    const s = status.toUpperCase();
    return (
        s === "ATIVO" ||
        s === "AGUARDANDO" ||
        s === "EM JANELA" ||
        s === "ATINGIDO ANTECIPADAMENTE" ||
        s === "TESTE" ||
        s === "PENDENTE"
    );
}

function cardSinal(item){
    return `
        <div class="origem">${item.origem || item.tipo || "MRG"}</div>
        <div class="alvo">${item.alvo || "-"}</div>
        <div class="status">${item.status || "-"}</div>
        <div class="info">Horário: ${item.horario || "não informado"}</div>
        <div class="info">VAR: ${item.variacao || "não informado"}</div>
        <div class="info">Janela: ${item.janela || "não informada"}</div>
        <div class="info">Score: ${item.score || "-"}</div>
        <div class="info">Resultado: ${item.resultado || "pendente"}</div>
        <div class="info">Multiplicador: ${item.multiplicador_real || "-"}</div>
    `;
}

async function carregar() {
    const { data, error } = await db
        .from("sinais")
        .select("*")
        .order("id", { ascending: false })
        .limit(30);

    if (error) {
        document.getElementById("principal").innerHTML = "<div class='vazio'>Erro ao carregar</div>";
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Verificar Supabase</div>";
        document.getElementById("historico").innerHTML = "<div class='vazio'>Erro no histórico</div>";
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById("principal").innerHTML = "<div class='vazio'>Nenhum sinal ativo</div>";
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Nenhum outro sinal</div>";
        document.getElementById("historico").innerHTML = "<div class='vazio'>Nenhum histórico</div>";
        return;
    }

    const ativos = data.filter(item => ehAtivo(item.status));
    const historico = data.filter(item => !ehAtivo(item.status));

    if(ativos.length > 0){
        document.getElementById("principal").innerHTML = cardSinal(ativos[0]);
    } else {
        document.getElementById("principal").innerHTML = "<div class='vazio'>Nenhum sinal ativo no momento</div>";
    }

    let outros = ativos.slice(1);
    if(outros.length === 0){
        document.getElementById("ativos").innerHTML = "<div class='vazio'>Nenhum outro sinal ativo</div>";
    } else {
        let htmlAtivos = "";
        outros.forEach(item => {
            htmlAtivos += `
                <div class="historico-item">
                    <div><span class="badge">${item.alvo || "-"}</span> | ${item.status || "-"}</div>
                    <div>Origem: ${item.origem || item.tipo || "MRG"}</div>
                    <div>Horário: ${item.horario || "não informado"}</div>
                    <div>Janela: ${item.janela || "não informada"}</div>
                    <div>Score: ${item.score || "-"}</div>
                </div>
            `;
        });
        document.getElementById("ativos").innerHTML = htmlAtivos;
    }

    if(historico.length === 0){
        document.getElementById("historico").innerHTML = "<div class='vazio'>Nenhum sinal encerrado ainda</div>";
    } else {
        let htmlHistorico = "";
        historico.forEach(item => {
            htmlHistorico += `
                <div class="historico-item">
                    <div><span class="badge">${item.alvo || "-"}</span> | ${item.status || "-"}</div>
                    <div>Origem: ${item.origem || item.tipo || "MRG"}</div>
                    <div>Horário: ${item.horario || "não informado"}</div>
                    <div>Janela: ${item.janela || "não informada"}</div>
                    <div>Resultado: ${item.resultado || "pendente"}</div>
                    <div>Multiplicador: ${item.multiplicador_real || "-"}</div>
                </div>
            `;
        });
        document.getElementById("historico").innerHTML = htmlHistorico;
    }
}

carregar();
setInterval(carregar, 5000);
</script>

</body>
</html>
