name: Build MRG iPhone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app for simulator
        run: |
          xcodebuild \
            -project MRGAviatorIPhone/MRGAviatorIPhone/MRGAviatorIPhone.xcodeproj \
            -scheme MRGAviatorIPhone \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip build output
        run: |
          mkdir -p output
          cp -R build/Build/Products/Debug-iphonesimulator/MRGAviatorIPhone.app output/
          cd output
          zip -r MRGAviatorIPhone-SIMULATOR-DEBUG.zip MRGAviatorIPhone.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MRGAviatorIPhone-SIMULATOR-DEBUG
          path: output/MRGAviatorIPhone-SIMULATOR-DEBUG.zip
